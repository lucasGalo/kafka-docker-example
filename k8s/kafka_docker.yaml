apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-docker-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-docker-example
  template:
    metadata:
      labels:
        app: kafka-docker-example
    spec:
      containers:
        - name: kafka-docker-example
          image: ucasgalo/kafka-docker-example:0.1.0
          ports:
            - containerPort: 8081
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: SERVER_PORT
              value: "8081"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-docker-example
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: kafka-docker-example
